version: '3.8'

services:
  # API Gateway Service
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defi-api-gateway
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=defi_asset_service
      - DB_USER=defi_user
      - DB_PASSWORD=defi_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EXTERNAL_SERVICE_A_URL=http://external-service-a:8081
      - EXTERNAL_SERVICE_B_URL=http://external-service-b:8082
      - LOG_LEVEL=info
      - JWT_SECRET=your-jwt-secret-key-here-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - defi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: defi-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=defi_asset_service
      - MYSQL_USER=defi_user
      - MYSQL_PASSWORD=defi_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - defi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache
  redis:
    image: redis:7.0-alpine
    container_name: defi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - defi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Queue Worker Service
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: defi-queue-worker
    environment:
      - ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=defi_asset_service
      - DB_USER=defi_user
      - DB_PASSWORD=defi_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - defi-network
    restart: unless-stopped
    command: ["./queue-worker"]

  # External Service A (Mock)
  external-service-a:
    image: alpine:3.18
    container_name: defi-external-service-a
    ports:
      - "8081:8080"
    volumes:
      - ./mocks/external-service-a:/app
    networks:
      - defi-network
    command: ["sh", "-c", "echo 'External Service A is running on port 8080' && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # External Service B (Mock)
  external-service-b:
    image: alpine:3.18
    container_name: defi-external-service-b
    ports:
      - "8082:8080"
    volumes:
      - ./mocks/external-service-b:/app
    networks:
      - defi-network
    command: ["sh", "-c", "echo 'External Service B is running on port 8080' && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: defi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - defi-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: defi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./config/monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    networks:
      - defi-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Nginx for load balancing (optional)
  nginx:
    image: nginx:alpine
    container_name: defi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - defi-network
    depends_on:
      - api-gateway
    restart: unless-stopped

  # Portainer for container management (optional)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: defi-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - defi-network
    restart: unless-stopped

  # Database admin (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: defi-phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - UPLOAD_LIMIT=100M
    ports:
      - "8083:80"
    networks:
      - defi-network
    depends_on:
      - mysql
    restart: unless-stopped

  # Redis admin (Redis Commander)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: defi-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8084:8081"
    networks:
      - defi-network
    depends_on:
      - redis
    restart: unless-stopped

networks:
  defi-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  portainer-data:
    driver: local